{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="page-header">
  <div class="container"><h1>System Administrator Portal</h1><p>For authorized sysadmins only</p></div>
</div>
<div class="container" style="max-width:460px; margin-bottom:3rem;">
  {% if error %}<div class="alert alert-error">⚠ {{ error }}</div>{% endif %}
  <div class="card card-blue">
    <h3 style="margin-bottom:1.25rem;">Admin Sign In</h3>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="e.g. admin" autocomplete="off" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Access Console →</button>
    </form>
    <hr>
    <p style="font-size:13px; color:var(--muted); text-align:center;">Return to <a href="/" style="color:var(--primary)">Home</a></p>
  </div>
</div>
{% endblock %}
