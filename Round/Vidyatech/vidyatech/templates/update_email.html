{% extends "base.html" %}
{% block title %}Update Email{% endblock %}
{% block content %}
<div class="page-header">
  <div class="container"><h1>Account Settings</h1><p>Update your contact information</p></div>
</div>
<div class="container" style="max-width:480px; margin-bottom:3rem;">
  {% if msg %}
    <div class="alert {% if ok %}alert-success{% else %}alert-error{% endif %}">{{ msg }}</div>
  {% endif %}
  <div class="card card-accent">
    <h3 style="margin-bottom:1.25rem;">Update Email Address</h3>
    <!-- VULNERABILITY: no CSRF token unless patched -->
    <form method="POST">
      {% if csrf_token %}
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      {% endif %}
      <div class="form-group">
        <label>Current Email</label>
        <input type="email" value="{{ user.email }}" disabled style="background:#f5f5f5; color:var(--muted);">
      </div>
      <div class="form-group">
        <label>New Email Address</label>
        <input type="email" name="email" placeholder="new@email.com" required>
      </div>
      <button type="submit" class="btn btn-primary">Update Email →</button>
    </form>
  </div>
</div>
{% endblock %}
