{% extends "base.html" %}
{% block title %}Change Password — Vidyatech University{% endblock %}
{% block content %}
<div class="page-header">
  <div class="container">
    <h1>Change Password</h1>
    <p>Update your student portal password.</p>
  </div>
</div>
<div class="page">
  <div class="container">
    <div class="card card-accent" style="max-width:480px">
      <h2 style="margin-bottom:1rem">New Password</h2>
      {% if msg %}
        <div class="alert {% if ok %}alert-success{% else %}alert-error{% endif %}">{{ msg }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="new_password" placeholder="Enter new password" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
