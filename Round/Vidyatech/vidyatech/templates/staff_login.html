{% extends "base.html" %}
{% block title %}Staff Login{% endblock %}
{% block content %}
<div class="page-header">
  <div class="container"><h1>Staff Portal</h1><p>For faculty and administrative staff only</p></div>
</div>
<div class="container" style="max-width:460px; margin-bottom:3rem;">
  {% if error %}<div class="alert alert-error">⚠ {{ error }}</div>{% endif %}
  <div class="card card-blue">
    <h3 style="margin-bottom:1.25rem;">Staff Sign In</h3>
    <form method="POST">
      <div class="form-group">
        <label>Employee ID</label>
        <input type="text" name="emp_id" placeholder="e.g. FAC001" autocomplete="off" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Login →</button>
    </form>
    <hr>
    <p style="font-size:13px; color:var(--muted); text-align:center;">Students should use the <a href="/login" style="color:var(--primary)">Student Portal</a></p>
  </div>
</div>
{% endblock %}
